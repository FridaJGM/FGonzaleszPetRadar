# docker-compose.yml — Uso LOCAL únicamente
# Para producción se usa Railway (ver DEPLOY.md)

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: petradar-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petradar
    ports:
      - "5432:5432"
    volumes:
      - petradar_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: petradar-redis
    ports:
      - "6379:6379"
    volumes:
      - petradar_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petradar-api
    env_file: .env
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: petradar
      DB_PORT: 5432
      DB_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TYPEORM_SYNC: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  petradar_pg:
  petradar_redis:
